<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waypoint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=3">
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="hidden">
    <div class="auth-bg">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="auth-logo-mark">
            <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="2"/>
              <circle cx="16" cy="16" r="6" fill="currentColor"/>
              <line x1="16" y1="1" x2="16" y2="8" stroke="currentColor" stroke-width="2"/>
              <line x1="16" y1="24" x2="16" y2="31" stroke="currentColor" stroke-width="2"/>
              <line x1="1" y1="16" x2="8" y2="16" stroke="currentColor" stroke-width="2"/>
              <line x1="24" y1="16" x2="31" y2="16" stroke="currentColor" stroke-width="2"/>
            </svg>
          </div>
          <h1>Waypoint</h1>
          <p>Funeral Director Workflow</p>
        </div>
        <div id="auth-login">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="login-email" type="email" placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
          </div>
          <button class="btn btn-primary btn-full" id="btn-login">Sign In</button>
          <div class="auth-divider"><span>or</span></div>
          <button class="btn btn-ghost btn-full" id="btn-show-register">Create Account</button>
        </div>
        <div id="auth-register" class="hidden">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-input" id="reg-name" type="text" placeholder="Your name" autocomplete="name">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="reg-email" type="email" placeholder="your@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" id="reg-password" type="password" placeholder="••••••••" autocomplete="new-password">
          </div>
          <button class="btn btn-primary btn-full" id="btn-register">Create Account</button>
          <div class="auth-divider"><span>or</span></div>
          <button class="btn btn-ghost btn-full" id="btn-show-login">Back to Sign In</button>
        </div>
        <p id="auth-error" class="auth-error hidden"></p>
        <p id="auth-success" class="auth-success hidden"></p>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden">

    <!-- TOP NAV -->
    <header id="topnav">
      <div class="topnav-left">
        <div class="topnav-logo">
          <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="2"/>
            <circle cx="16" cy="16" r="6" fill="currentColor"/>
            <line x1="16" y1="1" x2="16" y2="8" stroke="currentColor" stroke-width="2"/>
            <line x1="16" y1="24" x2="16" y2="31" stroke="currentColor" stroke-width="2"/>
            <line x1="1" y1="16" x2="8" y2="16" stroke="currentColor" stroke-width="2"/>
            <line x1="24" y1="16" x2="31" y2="16" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span class="topnav-brand">Waypoint</span>
        </div>
        <nav class="topnav-tabs">
          <a class="topnav-tab active" data-page="dashboard" href="#dashboard">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
          <a class="topnav-tab" data-page="settings" href="#settings">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 19.07a10 10 0 0 1 0-14.14"/></svg>
            Settings
          </a>
          <a class="topnav-tab" data-page="help" href="#help">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Help
          </a>
        </nav>
      </div>
      <div class="topnav-right">
        <div id="topbar-actions"></div>
        <div class="notif-wrap" id="notif-wrap">
          <button class="notif-btn" id="notif-btn" aria-label="Reminders">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notif-badge hidden" id="notif-badge">0</span>
          </button>
          <div class="notif-panel hidden" id="notif-panel"></div>
        </div>
        <div class="avatar-wrap" id="avatar-wrap">
          <button class="avatar-btn" id="avatar-btn" title="Account">
            <div class="user-avatar" id="sidebar-avatar">GF</div>
            <span class="avatar-name" id="sidebar-name">Greg</span>
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="avatar-dropdown hidden" id="avatar-dropdown">
            <div class="avatar-dropdown-name" id="avatar-dropdown-name">Greg Fountain</div>
            <div class="avatar-dropdown-divider"></div>
            <button class="avatar-dropdown-item" id="btn-goto-account">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Account Settings
            </button>
            <button class="avatar-dropdown-item danger" id="btn-signout">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- PAGES -->
    <main id="page-container">
      <div id="page-dashboard" class="page"></div>
      <div id="page-families" class="page hidden"></div>
      <div id="page-family-detail" class="page hidden"></div>
      <div id="page-settings" class="page hidden"></div>
      <div id="page-help" class="page hidden"></div>
    </main>

    <!-- FLOATING NEW FAMILY BUTTON -->
    <button id="fab-new-family" title="New Family Case" aria-label="New Family Case">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

  </div>

  <!-- MODAL CONTAINER -->
  <div id="modal-container"></div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
